swagger: "2.0"
info:
    title: StockWise API
    description: Учёт материальных средств и оборудования
    version: 1.0.0
host: localhost:8080
consumes:
    - application/json
    - application/xml
    - application/gob
produces:
    - application/json
    - application/xml
    - application/gob
paths:
    /assignments:
        get:
            tags:
                - assignments
            summary: list assignments
            description: Список закреплений с фильтрацией
            operationId: assignments#list
            parameters:
                - name: equipment_id
                  in: query
                  description: Фильтр по оборудованию
                  required: false
                  type: integer
                  format: int32
                - name: is_active
                  in: query
                  description: Фильтр по активности
                  required: false
                  type: boolean
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/AssignmentList'
                        required:
                            - assignments
            schemes:
                - http
    /assignments/{id}:
        get:
            tags:
                - assignments
            summary: get assignments
            description: Получить закрепление по ID
            operationId: assignments#get
            parameters:
                - name: id
                  in: path
                  description: ID закрепления
                  required: true
                  type: integer
                  format: int32
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Assignment'
                        required:
                            - target_type
                            - assigned_at
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/AssignmentsGetNotFoundResponseBody'
            schemes:
                - http
    /cards:
        get:
            tags:
                - cards
            summary: list cards
            description: Список всех карточек
            operationId: cards#list
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/CardList'
                        required:
                            - cards
            schemes:
                - http
        post:
            tags:
                - cards
            summary: create cards
            description: Создать карточку
            operationId: cards#create
            parameters:
                - name: CreateRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/CreateCardPayload'
                    required:
                        - number
                        - full_name
            responses:
                "201":
                    description: Created response.
                    schema:
                        $ref: '#/definitions/Card'
                        required:
                            - number
                            - full_name
            schemes:
                - http
    /cards/{number}:
        get:
            tags:
                - cards
            summary: get cards
            description: Получить карточку по номеру
            operationId: cards#get
            parameters:
                - name: number
                  in: path
                  description: Номер карточки
                  required: true
                  type: integer
                  format: int32
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Card'
                        required:
                            - number
                            - full_name
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/CardsGetNotFoundResponseBody'
            schemes:
                - http
        put:
            tags:
                - cards
            summary: update cards
            description: Обновить карточку
            operationId: cards#update
            parameters:
                - name: number
                  in: path
                  description: Номер карточки
                  required: true
                  type: integer
                  format: int32
                - name: UpdateRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/UpdateCardPayload'
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Card'
                        required:
                            - number
                            - full_name
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/CardsUpdateNotFoundResponseBody'
            schemes:
                - http
        delete:
            tags:
                - cards
            summary: delete cards
            description: Удалить карточку
            operationId: cards#delete
            parameters:
                - name: number
                  in: path
                  description: Номер карточки
                  required: true
                  type: integer
                  format: int32
            responses:
                "204":
                    description: No Content response.
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/CardsDeleteNotFoundResponseBody'
            schemes:
                - http
    /dictionaries/departments:
        get:
            tags:
                - departments
            summary: list departments
            description: Список всех подразделений
            operationId: departments#list
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/DepartmentList'
                        required:
                            - departments
            schemes:
                - http
    /dictionaries/departments/{code}:
        get:
            tags:
                - departments
            summary: get departments
            description: Получить подразделение по коду
            operationId: departments#get
            parameters:
                - name: code
                  in: path
                  description: Код подразделения
                  required: true
                  type: integer
                  format: int32
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Department'
                        required:
                            - code
                            - type
                            - name
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/DepartmentsGetNotFoundResponseBody'
            schemes:
                - http
    /dictionaries/nomenclatures:
        get:
            tags:
                - nomenclatures
            summary: list nomenclatures
            description: Список всех номенклатур
            operationId: nomenclatures#list
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/NomenclatureList'
                        required:
                            - nomenclatures
            schemes:
                - http
    /dictionaries/nomenclatures/{id}:
        get:
            tags:
                - nomenclatures
            summary: get nomenclatures
            description: Получить номенклатуру по ID
            operationId: nomenclatures#get
            parameters:
                - name: id
                  in: path
                  description: ID номенклатуры
                  required: true
                  type: integer
                  format: int32
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Nomenclature'
                        required:
                            - code
                            - name
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/NomenclaturesGetNotFoundResponseBody'
            schemes:
                - http
    /equipments:
        get:
            tags:
                - equipments
            summary: list equipments
            description: Список оборудования с фильтрацией
            operationId: equipments#list
            parameters:
                - name: status
                  in: query
                  description: Фильтр по статусу
                  required: false
                  type: string
                  enum:
                    - exp
                    - exp_int
                    - exp_sp
                    - broken
                    - written_off
                - name: nomenclature_id
                  in: query
                  description: Фильтр по номенклатуре
                  required: false
                  type: integer
                  format: int32
                - name: location
                  in: query
                  description: Фильтр по местоположению
                  required: false
                  type: string
                - name: search
                  in: query
                  description: Поиск по наименованию/модели/серийнику
                  required: false
                  type: string
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/EquipmentList'
                        required:
                            - equipments
            schemes:
                - http
        post:
            tags:
                - equipments
            summary: create equipments
            description: Создать оборудование
            operationId: equipments#create
            parameters:
                - name: CreateRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/CreateEquipmentPayload'
                    required:
                        - inventory_number
                        - model_name
                        - status
            responses:
                "201":
                    description: Created response.
                    schema:
                        $ref: '#/definitions/Equipment'
                        required:
                            - inventory_number
                            - model_name
                            - status
                "409":
                    description: Conflict response.
                    schema:
                        $ref: '#/definitions/EquipmentsCreateConflictResponseBody'
            schemes:
                - http
    /equipments/{inventory_number}:
        get:
            tags:
                - equipments
            summary: get equipments
            description: Получить оборудование по инвентарному номеру (с закреплением)
            operationId: equipments#get
            parameters:
                - name: inventory_number
                  in: path
                  description: Инвентарный номер
                  required: true
                  type: string
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Equipment'
                        required:
                            - inventory_number
                            - model_name
                            - status
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/EquipmentsGetNotFoundResponseBody'
            schemes:
                - http
        put:
            tags:
                - equipments
            summary: update equipments
            description: Обновить оборудование по инвентарному номеру
            operationId: equipments#update
            parameters:
                - name: inventory_number
                  in: path
                  description: Инвентарный номер
                  required: true
                  type: string
                - name: UpdateRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/UpdateEquipmentPayload'
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Equipment'
                        required:
                            - inventory_number
                            - model_name
                            - status
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/EquipmentsUpdateNotFoundResponseBody'
                "409":
                    description: Conflict response.
                    schema:
                        $ref: '#/definitions/EquipmentsUpdateConflictResponseBody'
            schemes:
                - http
        delete:
            tags:
                - equipments
            summary: delete equipments
            description: Удалить оборудование (мягкое удаление)
            operationId: equipments#delete
            parameters:
                - name: inventory_number
                  in: path
                  description: Инвентарный номер
                  required: true
                  type: string
            responses:
                "204":
                    description: No Content response.
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/EquipmentsDeleteNotFoundResponseBody'
            schemes:
                - http
    /waybills:
        get:
            tags:
                - waybills
            summary: list waybills
            description: Список накладных
            operationId: waybills#list
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/WaybillList'
                        required:
                            - waybills
            schemes:
                - http
        post:
            tags:
                - waybills
            summary: create waybills
            description: Создать накладную (статус draft)
            operationId: waybills#create
            parameters:
                - name: CreateRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/CreateWaybillPayload'
                    required:
                        - number
                        - issue_date
            responses:
                "201":
                    description: Created response.
                    schema:
                        $ref: '#/definitions/Waybill'
                        required:
                            - number
                            - issue_date
                            - status
            schemes:
                - http
    /waybills/{id}:
        get:
            tags:
                - waybills
            summary: get waybills
            description: Получить накладную по ID (с позициями)
            operationId: waybills#get
            parameters:
                - name: id
                  in: path
                  description: ID накладной
                  required: true
                  type: integer
                  format: int32
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Waybill'
                        required:
                            - number
                            - issue_date
                            - status
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/WaybillsGetNotFoundResponseBody'
            schemes:
                - http
        delete:
            tags:
                - waybills
            summary: delete waybills
            description: Удалить накладную (только draft)
            operationId: waybills#delete
            parameters:
                - name: id
                  in: path
                  description: ID накладной
                  required: true
                  type: integer
                  format: int32
            responses:
                "204":
                    description: No Content response.
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/WaybillsDeleteNotFoundResponseBody'
                "409":
                    description: Conflict response.
                    schema:
                        $ref: '#/definitions/WaybillsDeleteInvalidStatusResponseBody'
            schemes:
                - http
    /waybills/{id}/archive:
        post:
            tags:
                - waybills
            summary: archive waybills
            description: Архивировать накладную (signed → archived)
            operationId: waybills#archive
            parameters:
                - name: id
                  in: path
                  description: ID накладной
                  required: true
                  type: integer
                  format: int32
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Waybill'
                        required:
                            - number
                            - issue_date
                            - status
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/WaybillsArchiveNotFoundResponseBody'
                "409":
                    description: Conflict response.
                    schema:
                        $ref: '#/definitions/WaybillsArchiveInvalidStatusResponseBody'
            schemes:
                - http
    /waybills/{id}/sign:
        post:
            tags:
                - waybills
            summary: sign waybills
            description: Подписать накладную (draft → signed). Создаёт записи закреплений
            operationId: waybills#sign
            parameters:
                - name: id
                  in: path
                  description: ID накладной
                  required: true
                  type: integer
                  format: int32
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/Waybill'
                        required:
                            - number
                            - issue_date
                            - status
                "404":
                    description: Not Found response.
                    schema:
                        $ref: '#/definitions/WaybillsSignNotFoundResponseBody'
                "409":
                    description: Conflict response.
                    schema:
                        $ref: '#/definitions/WaybillsSignInvalidStatusResponseBody'
            schemes:
                - http
definitions:
    Assignment:
        title: Assignment
        type: object
        properties:
            assigned_at:
                type: string
                description: Дата закрепления
                example: "1996-10-08T04:47:53Z"
                format: date-time
            card_number:
                type: integer
                description: Номер карточки сотрудника
                example: 1317291525
                format: int32
            dept_name:
                type: string
                description: Наименование подразделения
                example: Sed voluptas hic omnis.
            full_name:
                type: string
                description: ФИО сотрудника
                example: Quo blanditiis eos earum.
            operator_comment:
                type: string
                description: Комментарий оператора
                example: Qui sed mollitia quis minus.
            target_type:
                type: string
                description: Тип закрепления
                example: department
                enum:
                    - employee
                    - department
                    - warehouse
            unassigned_at:
                type: string
                description: Дата снятия
                example: "1977-02-28T07:33:08Z"
                format: date-time
        description: Запись закрепления оборудования (история)
        example:
            assigned_at: "1995-02-23T22:26:34Z"
            card_number: 1361499610
            dept_name: Incidunt et.
            full_name: Laborum assumenda et enim laudantium voluptate totam.
            operator_comment: Sunt provident molestias necessitatibus quae et occaecati.
            target_type: department
            unassigned_at: "1970-12-30T11:08:00Z"
        required:
            - target_type
            - assigned_at
    AssignmentInfo:
        title: AssignmentInfo
        type: object
        properties:
            card_number:
                type: integer
                description: Номер карточки сотрудника
                example: 1528201536
                format: int32
            dept_name:
                type: string
                description: Наименование подразделения
                example: Enim a expedita et tempore.
            full_name:
                type: string
                description: ФИО сотрудника
                example: Багликов А.С.
            operator_comment:
                type: string
                description: Комментарий оператора
                example: Ut nam saepe.
            target_type:
                type: string
                description: Тип закрепления
                example: warehouse
                enum:
                    - employee
                    - department
                    - warehouse
        description: Информация о закреплении оборудования
        example:
            card_number: 1124794250
            dept_name: Neque voluptate impedit nobis ab iusto doloribus.
            full_name: Багликов А.С.
            operator_comment: Hic modi deserunt inventore minima numquam.
            target_type: employee
        required:
            - target_type
    AssignmentList:
        title: AssignmentList
        type: object
        properties:
            assignments:
                type: array
                items:
                    $ref: '#/definitions/Assignment'
                example:
                    - assigned_at: "1997-08-29T06:42:05Z"
                      card_number: 1126698923
                      dept_name: Adipisci totam culpa dolorem omnis.
                      full_name: Voluptas provident.
                      operator_comment: Qui nulla libero dolorem voluptas debitis non.
                      target_type: warehouse
                      unassigned_at: "2014-07-17T20:07:18Z"
                    - assigned_at: "1997-08-29T06:42:05Z"
                      card_number: 1126698923
                      dept_name: Adipisci totam culpa dolorem omnis.
                      full_name: Voluptas provident.
                      operator_comment: Qui nulla libero dolorem voluptas debitis non.
                      target_type: warehouse
                      unassigned_at: "2014-07-17T20:07:18Z"
                    - assigned_at: "1997-08-29T06:42:05Z"
                      card_number: 1126698923
                      dept_name: Adipisci totam culpa dolorem omnis.
                      full_name: Voluptas provident.
                      operator_comment: Qui nulla libero dolorem voluptas debitis non.
                      target_type: warehouse
                      unassigned_at: "2014-07-17T20:07:18Z"
        example:
            assignments:
                - assigned_at: "1997-08-29T06:42:05Z"
                  card_number: 1126698923
                  dept_name: Adipisci totam culpa dolorem omnis.
                  full_name: Voluptas provident.
                  operator_comment: Qui nulla libero dolorem voluptas debitis non.
                  target_type: warehouse
                  unassigned_at: "2014-07-17T20:07:18Z"
                - assigned_at: "1997-08-29T06:42:05Z"
                  card_number: 1126698923
                  dept_name: Adipisci totam culpa dolorem omnis.
                  full_name: Voluptas provident.
                  operator_comment: Qui nulla libero dolorem voluptas debitis non.
                  target_type: warehouse
                  unassigned_at: "2014-07-17T20:07:18Z"
                - assigned_at: "1997-08-29T06:42:05Z"
                  card_number: 1126698923
                  dept_name: Adipisci totam culpa dolorem omnis.
                  full_name: Voluptas provident.
                  operator_comment: Qui nulla libero dolorem voluptas debitis non.
                  target_type: warehouse
                  unassigned_at: "2014-07-17T20:07:18Z"
        required:
            - assignments
    AssignmentsGetNotFoundResponseBody:
        title: 'Mediatype identifier: application/vnd.goa.error; view=default'
        type: object
        properties:
            fault:
                type: boolean
                description: Is the error a server-side fault?
                example: false
            id:
                type: string
                description: ID is a unique identifier for this particular occurrence of the problem.
                example: 123abc
            message:
                type: string
                description: Message is a human-readable explanation specific to this occurrence of the problem.
                example: parameter 'p' must be an integer
            name:
                type: string
                description: Name is the name of this class of errors.
                example: bad_request
            temporary:
                type: boolean
                description: Is the error temporary?
                example: false
            timeout:
                type: boolean
                description: Is the error a timeout?
                example: true
        description: get_not_found_response_body result type (default view)
        example:
            fault: true
            id: 123abc
            message: parameter 'p' must be an integer
            name: bad_request
            temporary: true
            timeout: true
        required:
            - name
            - id
            - message
            - temporary
            - timeout
            - fault
    Card:
        title: Card
        type: object
        properties:
            full_name:
                type: string
                description: ФИО (без звания)
                example: Багликов А.С.
            number:
                type: integer
                description: Номер карточки (из КУ Ф-111)
                example: 1177978477
                format: int32
        description: Карточка сотрудника
        example:
            full_name: Багликов А.С.
            number: 1263851071
        required:
            - number
            - full_name
    CardList:
        title: CardList
        type: object
        properties:
            cards:
                type: array
                items:
                    $ref: '#/definitions/Card'
                example:
                    - full_name: Багликов А.С.
                      number: 274967968
                    - full_name: Багликов А.С.
                      number: 274967968
        example:
            cards:
                - full_name: Багликов А.С.
                  number: 274967968
                - full_name: Багликов А.С.
                  number: 274967968
                - full_name: Багликов А.С.
                  number: 274967968
        required:
            - cards
    CardsDeleteNotFoundResponseBody:
        title: 'Mediatype identifier: application/vnd.goa.error; view=default'
        type: object
        properties:
            fault:
                type: boolean
                description: Is the error a server-side fault?
                example: false
            id:
                type: string
                description: ID is a unique identifier for this particular occurrence of the problem.
                example: 123abc
            message:
                type: string
                description: Message is a human-readable explanation specific to this occurrence of the problem.
                example: parameter 'p' must be an integer
            name:
                type: string
                description: Name is the name of this class of errors.
                example: bad_request
            temporary:
                type: boolean
                description: Is the error temporary?
                example: true
            timeout:
                type: boolean
                description: Is the error a timeout?
                example: true
        description: delete_not_found_response_body result type (default view)
        example:
            fault: false
            id: 123abc
            message: parameter 'p' must be an integer
            name: bad_request
            temporary: false
            timeout: true
        required:
            - name
            - id
            - message
            - temporary
            - timeout
            - fault
    CardsGetNotFoundResponseBody:
        title: 'Mediatype identifier: application/vnd.goa.error; view=default'
        type: object
        properties:
            fault:
                type: boolean
                description: Is the error a server-side fault?
                example: false
            id:
                type: string
                description: ID is a unique identifier for this particular occurrence of the problem.
                example: 123abc
            message:
                type: string
                description: Message is a human-readable explanation specific to this occurrence of the problem.
                example: parameter 'p' must be an integer
            name:
                type: string
                description: Name is the name of this class of errors.
                example: bad_request
            temporary:
                type: boolean
                description: Is the error temporary?
                example: false
            timeout:
                type: boolean
                description: Is the error a timeout?
                example: false
        description: get_not_found_response_body result type (default view)
        example:
            fault: true
            id: 123abc
            message: parameter 'p' must be an integer
            name: bad_request
            temporary: false
            timeout: true
        required:
            - name
            - id
            - message
            - temporary
            - timeout
            - fault
    CardsUpdateNotFoundResponseBody:
        title: 'Mediatype identifier: application/vnd.goa.error; view=default'
        type: object
        properties:
            fault:
                type: boolean
                description: Is the error a server-side fault?
                example: false
            id:
                type: string
                description: ID is a unique identifier for this particular occurrence of the problem.
                example: 123abc
            message:
                type: string
                description: Message is a human-readable explanation specific to this occurrence of the problem.
                example: parameter 'p' must be an integer
            name:
                type: string
                description: Name is the name of this class of errors.
                example: bad_request
