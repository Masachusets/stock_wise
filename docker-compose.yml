services:
  db:
    image: postgres:16-alpine
    container_name: stockwise-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: stockwise
      POSTGRES_USER: stockwise
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stockwise}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/create.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockwise"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
